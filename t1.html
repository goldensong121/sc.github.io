1. 系统概述

1.1 系统简介
《EM蓄电池 · 3D数字孪生供应链虚拟仿真实验》是一个基于Web的交互式仿真平台。它利用Three.js构建了3D可视化背景，并结合ECharts数据图表，模拟了新能源汽车蓄电池从物料采购、生产制造、物流配送到市场销售的完整供应链流程。
用户需扮演供应链管理者的角色，在10个逻辑步骤中完成需求预测、生产计划、BOM物料计算、供应商选择、物流规划等决策，最终通过60天模拟运行获得综合评分。

1.2 核心功能
- 3D数字孪生背景：沉浸式视觉体验，直观展示供应链节点（工厂、供应商、销售点）。
- 分步实验导航：引导用户按科学流程完成决策，避免操作跳跃。
- 数据驱动的决策：基于历史销售数据、供应商库存、BOM清单进行定量分析。
- 实时模拟与评分：运行60天模拟，从采购、物流、市场、生产、预测五个维度自动评分。
- 成绩记录与导出：自动保存所有操作者的成绩（滚动30条），支持Excel导出和历史查询。

2. 系统要求与登录

2.1 环境要求
- 浏览器：推荐使用最新版 Google Chrome 或 Microsoft Edge。
- 网络：需要稳定的互联网连接，用于加载CDN资源。
- 显示：建议屏幕分辨率不低于 1366×768。

2.2 登录操作
1. 打开系统页面，您将看到登录卡片。
2. 在"用户名"和"密码"输入框中，输入预设的测试账号：
   用户名：EMAdmin

3. 点击 "进入实验" 按钮。
4. 登录成功后，页面将自动跳转至主工作台，并显示"登录成功"提示。同时，登录卡片上的"累计登录人数"将自动增加1，该数据由浏览器本地存储(LocalStorage)持久化保存。

3. 实验操作流程详解

主工作台顶部为10步导航栏。实验必须按顺序进行，只有完成上一步，下一步的按钮才会被激活。当前步骤高亮为蓝色，已完成步骤显示为绿色。

步骤1：登录（欢迎页）
- 操作：此步骤仅为登录后的欢迎界面，无具体操作。
- 作用：确认用户身份，展示实验基本参数（周期60天、2个工厂、4个销售点）。
- 后续操作：点击 "开始实验 →" 进入步骤2。

步骤2：案例数据
- 目标：理解实验的基础数据，包括销售网点、供应商和评分标准。
- 操作说明：
  1. 浏览 "销售网点" 表格，查看各网点的当前库存、历史6个月销量和系统给出的初始预测。
  2. 浏览 "供应商" 表格，查看各供应商的物料类型、可用库存、单价。
  3. 阅读 "评分标准" 卡片，了解最终成绩由采购成本、物流成本、市场满足率、生产满足率、预测偏差五部分组成。
  4. 勾选 "我已阅读并理解" 复选框。
  5. 点击 "确认下一步"。

步骤3：需求预测
- 目标：根据历史数据，为四个销售点设定未来60天的需求量。
- 操作说明：
  1. 每个销售点对应一个 "预测量" 滑动条。参考其"历史月均"值，拖动滑块调整预测数量（范围10,000~40,000件）。

  3. 下方的 "需求预测柱状图" 会动态更新。
  4. 确认后点击 "保存预测"。
  5. 若想恢复默认值，可点击 "恢复默认"。
- 数据分析提示：注意"日本总代"的货币单位是日元（JPY），其历史销量波动较大。

步骤4：生产补货
- 目标：根据总预测需求，制定广州和苏州两个工厂的生产计划。
- 操作说明：
  1. 页面顶部显示 "总需求预测" 总和。
  2. 两个工厂卡片中显示日产能、当前库存和60天最大总产能。
  3. 在 "计划产量" 输入框中输入规划产量（不能超过最大产能）。
  4. 下方的 "建议补货" 表格自动计算每个销售点的理论补货量。
  5. 点击 "确认计划"。
- 数据分析提示：计划总产量应尽可能覆盖总需求，同时考虑产能和库存成本。

步骤5：物料需求 (BOM)
- 目标：根据生产计划，计算出所需原材料的种类和数量（BOM展开）。
- 操作说明：
  1. 系统自动计算并展示 "BOM物料清单" 和 "总需求量"。
  2. 可在 "手动调整物料需求量" 区域微调（如考虑损耗率）。
  3. 点击 "确认物料需求"。
- 数据分析提示：电极板需求量为产量的2倍，采购成本占比最高。

步骤6：供应商选择
- 目标：从6家供应商中，为所需物料选择合适的供应来源。
- 操作说明：
  1. 浏览 "供应商列表"，每个卡片显示供应商名称、物料、可用库存和单价。
  2. 点击卡片选择（可多选），边框变绿显示打勾图标。
  3. 右侧 "已选供应商" 实时汇总。
  4. 点击 "确认供应商"。
- 数据分析提示：对比同物料供应商价格，权衡单价与库存、运输距离。

步骤7：物流计划
- 目标：规划从供应商/工厂到销售点的运输路线和运输量。
- 操作说明：
  1. "路线列表" 中每条路线包含起点、终点、距离、运输方式和天数。
  2. 点击路线卡片选中（绿色高亮），再次点击取消。
  3. 在 "运输量" 输入框中填写运输数量（件）。
  4. 下方 "物流网络图" 动态显示选中路线（绿色线条）。
  5. 点击 "确认物流计划"。
- 数据分析提示：海运成本低但速度慢，汽运速度快但成本高。

步骤8：数字孪生模拟
- 目标：调节外部环境参数，运行60天动态模拟。
- 操作说明：
  1. 拖动四个滑块（锂矿指数、海运周期、良品率、回收率），"实时指标" 立即响应。
  2. "3D供应商地图" 支持鼠标拖拽旋转查看。
  3. "绩效雷达图" 直观对比各维度效率。
  4. 点击 "🚀 运行60天模拟"。
  5. 模拟完成后显示结果摘要，"查看成绩 →" 按钮可见。
  6. 点击进入步骤9。
- 重要机制：模拟后自动计算总分并记录到本地成绩库。

步骤9：成绩
- 目标：查看本次实验的详细评分及历史成绩记录。
- 操作说明：
  1. "当前成绩总览" 以仪表盘展示五个维度得分和总分（满分100）。
  2. "成绩滚动记录" 展示所有操作者记录（最多30条）。
  3. "下载成绩Excel" 导出为 .xlsx 文件。
  4. "历史成绩查询" 按用户名筛选记录。
  5. 点击 "进入复盘"。

步骤10：复盘分析
- 目标：回顾关键决策数据，记录实验笔记。
- 操作说明：
  1. "供应链流动图" 以桑基图展示从供应商到销售网的流量。
  2. "关键数字卡片" 汇总总需求、总生产、物料需求等指标。
  3. "优化建议" 根据模拟结果自动生成。
  4. "复盘笔记" 输入实验总结。
  5. 点击 "保存笔记" 完成实验。
  6. 点击 "🔄 再来一次" 重置数据重新开始。

Q1：为什么我无法点击下一步按钮？
A：本实验要求按顺序完成，请检查当前步骤的所有必填操作是否已完成。

Q2：模拟运行后，成绩很低怎么办？
A：建议复盘步骤10的"优化建议"，调整需求预测、供应商选择或物流计划。

Q3：成绩记录会丢失吗？

Q4：3D地图或图表无法加载？

Q5：如何重置整个实验？

1.销售预测：读取4大网点6个月历史销量，输出60天总预测量

3.采购计划：根据BOM消耗计算原料总需求，对比工厂期初库存，向多家供应商比价采购（低价优先）
4.物流计划：分原料运输（供应商→工厂）、成品运输（工厂→销售网点），对比汽运/铁路/海运成本，选择经济路线

6.成绩评定：按5项指标综合打分

                <div class="slider-group"><label>锂矿指数：<span id="lithiumVal">100</span></label><input type="range" id="lithiumSlider" min="50" max="150" value="100"></div>
                <div class="slider-group"><label>海运周期：<span id="shippingVal">25</span></label><input type="range" id="shippingSlider" min="15" max="45" value="25"></div>
                <div class="slider-group"><label>良品率：<span id="yieldVal">92</span>%</label><input type="range" id="yieldSlider" min="80" max="99" value="92"></div>
                <div class="slider-group"><label>回收率：<span id="recycleVal">35</span>%</label><input type="range" id="recycleSlider" min="0" max="70" value="35"></div>
              </div>
              <div class="card"><h4>实时指标</h4><div class="gauge-grid"><div class="gauge-item">电池成本<br><span class="value" id="twinCost">90.0</span> $/kWh</div><div class="gauge-item">碳排放<br><span class="value" id="twinCarbon">85.0</span> kgCO2</div><div class="gauge-item">供应周期<br><span class="value" id="twinDays">45.0</span> 天</div></div></div>
            </div>
            <div class="map3d-card" id="supplierMap3d"></div>
            <div id="twinChart" style="height:220px; margin-top:0.8rem;"></div>
            <div class="card"><h4>配置摘要</h4><p>总需求：${totalDemand}件 | 总生产：${totalProd}件 | 供应商：${Object.keys(state.selectedSuppliers).length}家 | 路线：${Object.keys(state.selectedRoutes).length}条</p></div>
            <button class="primary" id="runFullSim">🚀 运行60天模拟</button>
            <div id="simResultText" class="hidden"></div>
            <button class="secondary hidden" id="viewResults">查看成绩 →</button>`;
          break;
        }
        case 9: {
          if (!state.simulationResult) html = `<h2><i class="fas fa-trophy"></i> 步骤9：成绩</h2><p>尚未模拟，请先完成步骤8。</p><button class="primary" onclick="window._nav(8)">返回模拟</button>`;
          else {
            const r = state.simulationResult;
            html = `<h2><i class="fas fa-trophy"></i> 步骤9：实验成绩</h2><div class="gauge-grid">
              <div class="gauge-item"><h4>采购成本</h4><span class="value">${r.unitProcCost}</span><p>得分：${r.procScore}/25</p></div>
              <div class="gauge-item"><h4>物流成本</h4><span class="value">${r.unitLogCost}</span><p>得分：${r.logScore}/25</p></div>
              <div class="gauge-item"><h4>市场满足率</h4><span class="value">${r.fillRate}%</span><p>得分：${r.fillScore}/20</p></div>
              <div class="gauge-item"><h4>生产满足率</h4><span class="value">${r.prodRate}%</span><p>得分：${r.prodScore}/15</p></div>
              <div class="gauge-item"><h4>预测偏差</h4><span class="value">${r.deviation}%</span><p>得分：${r.devScore}/15</p></div>
            </div><div class="card" style="text-align:center;"><h3>总分：<span style="color:#00ff88; font-size:2.2rem;">${r.totalScore}</span> / 100</h3></div>
            <div style="margin-top:1rem;"><h4>📋 操作过的人的成绩记录 (滚动30条)</h4><div class="score-roll" id="scoreRollContainer"></div></div>
            <div style="margin-top:0.8rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
              <button class="btn-download" id="downloadExcelBtn"><i class="fas fa-file-excel"></i> 下载成绩Excel</button>
              <button class="secondary" id="goToReview">进入复盘</button>
            </div>
            <div style="margin-top:0.8rem;"><h4>🔍 历史成绩查询</h4><input type="text" id="historySearchInput" placeholder="输入用户名搜索" style="background:#0b1424;border:1px solid #2a3a55;color:white;padding:0.4rem 1rem;border-radius:1.2rem;width:200px;"><button class="primary" id="historySearchBtn" style="padding:0.4rem 1.2rem;margin-left:0.4rem;">查询</button><div id="historyResult" style="margin-top:0.4rem;"></div></div>
            `;
            setTimeout(() => { renderScoreRoll(); renderHistorySearch(); }, 100);
          }
          break;
        }
        case 10: {
          let totalDemand = Object.values(state.demandForecast).reduce((a,b)=>a+b,0);
          let totalProd = Object.values(state.productionPlan).reduce((a,b)=>a+b,0);
          let totalMat = Object.values(state.materialRequirements).reduce((a,b)=>a+b,0);
          let supCnt = Object.keys(state.selectedSuppliers).length;
          let routeCnt = Object.keys(state.selectedRoutes).length;
          let transQty = Object.values(state.routeQuantities).reduce((a,b)=>a+(parseInt(b)||0),0);
          let fillRate = state.simulationResult ? state.simulationResult.fillRate : (totalProd/totalDemand*100).toFixed(1);
          html = `<h2><i class="fas fa-redo"></i> 步骤10：复盘分析</h2>
            <div id="reviewFlowChart" style="height:340px; margin:0.8rem 0;"></div>
            <div class="flex-row"><div class="card"><h4>关键数字</h4><table><tr><td>总需求</td><td><strong>${totalDemand.toLocaleString()}</strong></td></tr><tr><td>总生产</td><td><strong>${totalProd.toLocaleString()}</strong></td></tr><tr><td>物料需求</td><td><strong>${totalMat.toLocaleString()}</strong></td></tr><tr><td>供应商</td><td><strong>${supCnt}家</strong></td></tr><tr><td>运输路线</td><td><strong>${routeCnt}条</strong></td></tr><tr><td>运输量</td><td><strong>${transQty.toLocaleString()}</strong></td></tr></table></div>
              <div class="card"><h4>优化建议</h4>${state.simulationResult ? (()=>{ let s=[]; if(state.simulationResult.fillRate<95) s.push('市场满足率偏低，建议增产或优化物流'); if(parseFloat(state.simulationResult.deviation)>10) s.push('预测偏差较大，调整预测模型'); if(parseFloat(state.simulationResult.unitProcCost)>5) s.push('采购成本偏高，考虑更低价格供应商'); if(s.length===0) s.push('各项指标良好，尝试微调参数'); return s.map(t=>`<li>${t}</li>`).join(''); })() : '<p>运行模拟后显示建议</p>'}</div>
            </div>
            <div class="card"><h4>复盘笔记</h4><textarea id="reviewNotes" style="width:100%; height:70px; background:#0b1424; color:white; border:1px solid #2a3a55; border-radius:0.8rem; padding:0.6rem;"></textarea></div>
            <button class="primary" id="saveReview">保存笔记</button><button class="secondary" id="resetExperiment">🔄 再来一次</button>`;
          break;
        }
        default: html = '<p>未知步骤</p>';
      }
      stepContent.innerHTML = html;
      bindEvents(step);
      if (step === 3) initDemandChart();
      if (step === 7) initRouteMap();
      if (step === 8) { initTwinDashboard(); updateTwinMetrics(); initSupplierMap3D(); }
      if (step === 10) initReviewFlowChart();
      if (step === 2) {
        document.getElementById('downloadManualBtn')?.addEventListener('click', downloadManualTxt);
        document.getElementById('downloadSimDataBtn')?.addEventListener('click', downloadSimDataTxt);
      }
    }

    // ========== 下载操作手册 TXT ==========

    function downloadSimDataTxt() {
      const blob = new Blob([simulationDataContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '新能源汽车电池供应链仿真实验.txt';

    // ========== 成绩滚动渲染 ==========
    function renderScoreRoll() {
      const container = document.getElementById('scoreRollContainer');
      if (!container) return;
      if (scoreRoll.length === 0) {
        container.innerHTML = '<div style="color:#666; text-align:center; padding:0.5rem;">暂无成绩记录</div>';
        return;
      }
      let html = '';
      const list = scoreRoll.slice(0, 30);
      list.forEach(item => {
        const timeStr = item.time ? new Date(item.time).toLocaleString() : '';
        html += `<div class="score-roll-item"><span class="user"><i class="fas fa-user"></i> ${item.user}</span><span class="score">${item.score}分</span><span style="color:#667;font-size:0.7rem;">${timeStr}</span></div>`;
      });
      container.innerHTML = html;
    }

    function addScoreRecord(username, score) {
      const record = { user: username || 'EMAdmin', score: score, time: Date.now() };
      scoreRoll.unshift(record);
      if (scoreRoll.length > 30) scoreRoll = scoreRoll.slice(0, 30);
      localStorage.setItem('em_scoreRoll', JSON.stringify(scoreRoll));
    }

    function renderHistorySearch() {
      const input = document.getElementById('historySearchInput');
      const btn = document.getElementById('historySearchBtn');
      const resultDiv = document.getElementById('historyResult');
      if (!input || !btn || !resultDiv) return;
      const doSearch = () => {
        const keyword = input.value.trim().toLowerCase();
        if (!keyword) {
          resultDiv.innerHTML = '<span style="color:#888;">请输入用户名查询</span>';
          return;
        }
        const filtered = scoreRoll.filter(item => item.user.toLowerCase().includes(keyword));
        if (filtered.length === 0) {
          resultDiv.innerHTML = '<span style="color:#ff8866;">未找到相关记录</span>';
          return;
        }
        let html = '<div class="score-roll" style="max-height:150px;">';
        filtered.slice(0, 20).forEach(item => {
          const timeStr = item.time ? new Date(item.time).toLocaleString() : '';
          html += `<div class="score-roll-item"><span class="user">${item.user}</span><span class="score">${item.score}分</span><span style="color:#667;font-size:0.7rem;">${timeStr}</span></div>`;
        });
        html += '</div>';
        resultDiv.innerHTML = html;
      };
      btn.addEventListener('click', doSearch);
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') doSearch(); });
    }

    function downloadExcel() {
      if (scoreRoll.length === 0) {
        alert('暂无成绩数据可导出');
        return;
      }
      const data = scoreRoll.map((item, idx) => ({
        '序号': idx + 1,
        '用户名': item.user,
        '总分': item.score,
        '时间': item.time ? new Date(item.time).toLocaleString() : ''
      }));
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(data);
      XLSX.utils.book_append_sheet(wb, ws, '成绩');
      XLSX.writeFile(wb, 'EM蓄电池_成绩记录.xlsx');
      notify('成绩Excel导出成功！');
    }

    // ========== 事件绑定 ==========
    function bindEvents(step) {
      if (step === 2) {
        document.getElementById('confirmStep2')?.addEventListener('click', ()=>{
          if (document.getElementById('understandData')?.checked) { completeStep(2); navigateToStep(3); }
          else alert('请先确认已阅读数据');
        });
      }
      if (step === 3) {
        document.querySelectorAll('[id$="_slider"]').forEach(sl => {
          sl.addEventListener('input', function() {
            const id = this.id.replace('_slider','');
            const valEl = document.getElementById(id+'_val');
            if (valEl) valEl.textContent = this.value;
            state.demandForecast[id] = parseInt(this.value);
            updateDemandChart();
          });
        });
        document.getElementById('saveForecast')?.addEventListener('click', ()=>{ completeStep(3); notify('需求预测已保存'); });
        document.getElementById('resetForecast')?.addEventListener('click', ()=>{
          MASTER_DATA.salesPoints.forEach(p=>{ state.demandForecast[p.id]=p.forecast; const sl=document.getElementById(p.id+'_slider'); if(sl) sl.value=p.forecast; const v=document.getElementById(p.id+'_val'); if(v) v.textContent=p.forecast; });
          updateDemandChart();
        });
      }
      if (step === 4) {
        document.querySelectorAll('[id$="_prod"]').forEach(inp => {
          inp.addEventListener('input', function() {
            const factory = this.id.replace('_prod','');
            state.productionPlan[factory] = parseInt(this.value) || 0;
            updateReplenishmentDisplay();
          });
        });
        document.getElementById('confirmProduction')?.addEventListener('click', ()=>{ completeStep(4); navigateToStep(5); });
        updateReplenishmentDisplay();
      }
      if (step === 5) {
        document.querySelectorAll('[id^="mat_"]').forEach(inp => {
          inp.addEventListener('input', function() {
            const mat = this.id.replace('mat_','');
            state.materialRequirements[mat] = parseFloat(this.value) || 0;
          });
        });
        document.getElementById('confirmBOM')?.addEventListener('click', ()=>{ completeStep(5); navigateToStep(6); });
      }
      if (step === 6) {
        document.querySelectorAll('.supplier-card').forEach(card => {
          card.addEventListener('click', function() {
            const id = this.dataset.id;
            if (state.selectedSuppliers[id]) { delete state.selectedSuppliers[id]; this.classList.remove('selected'); }
            else { state.selectedSuppliers[id]=true; this.classList.add('selected'); }
            updateSelectedSuppliersDisplay();
          });
        });
        document.getElementById('confirmSuppliers')?.addEventListener('click', ()=>{
          if (Object.keys(state.selectedSuppliers).length===0) { alert('至少选择一家供应商'); return; }
          completeStep(6); navigateToStep(7);
        });
      }
      if (step === 7) {
        document.querySelectorAll('.route-item').forEach(item => {
          item.addEventListener('click', function(e) {
            if (e.target.tagName === 'INPUT') return;
            const id = this.dataset.id;
            if (state.selectedRoutes[id]) { delete state.selectedRoutes[id]; this.classList.remove('selected'); }
            else { state.selectedRoutes[id]=true; this.classList.add('selected'); }
          });
        });
        document.querySelectorAll('.route-qty').forEach(inp => {
          inp.addEventListener('input', function() { state.routeQuantities[this.dataset.route] = parseInt(this.value)||0; });
          inp.addEventListener('click', e=>e.stopPropagation());
        });
        document.getElementById('confirmRoutes')?.addEventListener('click', ()=>{
          if (Object.keys(state.selectedRoutes).length===0) { alert('至少选择一条路线'); return; }
          completeStep(7); navigateToStep(8);
        });
      }
      if (step === 8) {
        ['lithium','shipping','yield','recycle'].forEach(id => {
          document.getElementById(id+'Slider')?.addEventListener('input', updateTwinMetrics);
        });
        document.getElementById('runFullSim')?.addEventListener('click', runSimulation);
        document.getElementById('viewResults')?.addEventListener('click', ()=>navigateToStep(9));
      }
      if (step === 9) {
        document.getElementById('goToReview')?.addEventListener('click', ()=>{ completeStep(9); navigateToStep(10); });
        document.getElementById('downloadExcelBtn')?.addEventListener('click', downloadExcel);
        setTimeout(renderHistorySearch, 200);
      }
      if (step === 10) {
        document.getElementById('saveReview')?.addEventListener('click', ()=>{
          const notes = document.getElementById('reviewNotes')?.value||'';
          completeStep(10);
          notify('复盘笔记已保存！实验完成。');
        });
        document.getElementById('resetExperiment')?.addEventListener('click', resetExperiment);
      }
    }

    // ========== 辅助函数 ==========
    function updateReplenishmentDisplay() {
      const display = document.getElementById('replenishmentDisplay');
      if (!display) return;
      const totalProd = Object.values(state.productionPlan).reduce((a,b)=>a+b,0);
      const totalDemand = Object.values(state.demandForecast).reduce((a,b)=>a+b,0);
      let html = '<table><tr><th>网点</th><th>预测需求</th><th>建议补货</th></tr>';
      MASTER_DATA.salesPoints.forEach(p => {
        const ratio = state.demandForecast[p.id]/totalDemand;
        html += `<tr><td>${p.id}</td><td>${state.demandForecast[p.id]}件</td><td>${Math.round(totalProd*ratio)}件</td></tr>`;
      });
      html += '</table>';
      display.innerHTML = html;
    }
    function updateSelectedSuppliersDisplay() {
      const display = document.getElementById('selectedSuppliersDisplay');
      if (!display) return;
      const sel = Object.keys(state.selectedSuppliers);
      if (!sel.length) { display.innerHTML = '<p>未选择</p>'; return; }
      display.innerHTML = sel.map(id => {
        const s = MASTER_DATA.suppliers.find(sp=>sp.id===id);
        return `<span class="tag">${s.id}</span>`;
      }).join(' ');
    }
    function updateDemandChart() {
      const dom = document.getElementById('demandChart');
      if (!dom) return;
      const chart = echarts.getInstanceByDom(dom) || echarts.init(dom);
      chart.setOption({
        backgroundColor: 'transparent',
        xAxis: { data: MASTER_DATA.salesPoints.map(p=>p.id), axisLabel:{color:'#ccc'} },
        yAxis: { axisLabel:{color:'#ccc'} },
        series: [{ data: MASTER_DATA.salesPoints.map(p=>state.demandForecast[p.id]), type: 'bar', color: '#00d2ff', itemStyle:{borderRadius:[6,6,0,0]} }]
      });
    }
    function initDemandChart() { updateDemandChart(); }
    function initRouteMap() {
      const dom = document.getElementById('routeMap');
      if (!dom) return;
      const chart = echarts.init(dom);
      const nodes=[], links=[], nodeMap={};
      MASTER_DATA.routes.forEach(r => {
        if (!nodeMap[r.from]) { nodeMap[r.from]=true; nodes.push({name:r.from, x:Math.random()*500, y:Math.random()*200}); }
        if (!nodeMap[r.to]) { nodeMap[r.to]=true; nodes.push({name:r.to, x:Math.random()*500, y:Math.random()*200}); }
      });
      MASTER_DATA.routes.forEach(r => {
        const fromIdx = nodes.findIndex(n=>n.name===r.from), toIdx = nodes.findIndex(n=>n.name===r.to);
        const sel = state.selectedRoutes[r.id];
        links.push({ source: fromIdx, target: toIdx, label: {show:true, formatter:`${r.dist}km`, color:'#aaa'}, lineStyle: {color: sel?'#00ff88':'#00d2ff', width: sel?2:1} });
      });
      chart.setOption({
        backgroundColor: 'transparent',
        series: [{ type: 'graph', layout: 'force', roam: true, data: nodes, links, force: { repulsion: 400, edgeLength: [160,300] }, lineStyle:{curveness:0.2}, label:{show:true,color:'#ccc',fontSize:10}, itemStyle:{color:'#00ff88'} }]
      });
    }
    function updateTwinMetrics() {
      const li = parseInt(document.getElementById('lithiumSlider')?.value)||100;
      const sh = parseInt(document.getElementById('shippingSlider')?.value)||25;
      const yi = parseInt(document.getElementById('yieldSlider')?.value)||92;
      const re = parseInt(document.getElementById('recycleSlider')?.value)||35;
      document.getElementById('lithiumVal').textContent = li;
      document.getElementById('shippingVal').textContent = sh;
      document.getElementById('yieldVal').textContent = yi;
      document.getElementById('recycleVal').textContent = re;
      const cost = (90*(li/100)*(1+(sh-15)/100) - 5*((yi-80)/19) - 8*(re/70)).toFixed(1);
      const carbon = (80 + (sh-15)*0.5 - re*0.4).toFixed(1);
      const days = (45 + (sh-15) - (yi-80)*0.3).toFixed(1);
      document.getElementById('twinCost').textContent = cost;
      document.getElementById('twinCarbon').textContent = carbon;
      document.getElementById('twinDays').textContent = days;
    }
    function initTwinDashboard() {
      const dom = document.getElementById('twinChart');
      if (!dom) return;
      const chart = echarts.init(dom);
      chart.setOption({
        backgroundColor:'transparent',
        title: { text:'绩效雷达', left:'center', textStyle:{color:'#ccc', fontSize:13} },
        radar: { indicator: [ {name:'采购效率',max:100}, {name:'生产效率',max:100}, {name:'物流效率',max:100}, {name:'销售达成',max:100}, {name:'回收利用',max:100} ], axisName:{color:'#ccc'} },
        series: [{ type:'radar', data:[{ value:[85,92,78,88,65], name:'当前方案', areaStyle:{color:'rgba(0,255,136,0.2)'}, lineStyle:{color:'#00ff88'} }] }]
      });
    }
    function initReviewFlowChart() {
      const dom = document.getElementById('reviewFlowChart');
      if (!dom) return;
      const totalDemand = Object.values(state.demandForecast).reduce((a,b)=>a+b,0);
      const totalProd = Object.values(state.productionPlan).reduce((a,b)=>a+b,0);
      const totalMat = Object.values(state.materialRequirements).reduce((a,b)=>a+b,0);
      const supCnt = Object.keys(state.selectedSuppliers).length;
      const routeCnt = Object.keys(state.selectedRoutes).length;
      const transQty = Object.values(state.routeQuantities).reduce((a,b)=>a+(parseInt(b)||0),0);
      const fillRate = state.simulationResult ? state.simulationResult.fillRate : (totalProd/totalDemand*100).toFixed(1);
      const chart = echarts.init(dom);
      const data = [
        { name: `供应商\n(${supCnt}家)` },
        { name: `原料入库\n(${totalMat.toLocaleString()})` },
        { name: `工厂生产\n(${totalProd.toLocaleString()})` },
        { name: `物流运输\n(${routeCnt}条)` },
        { name: `销售网点\n(${fillRate}%)` }
      ];
      const links = [
        { source: data[0].name, target: data[1].name, value: totalMat || 1 },
        { source: data[1].name, target: data[2].name, value: totalProd || 1 },
        { source: data[2].name, target: data[3].name, value: transQty || totalProd || 1 },
        { source: data[3].name, target: data[4].name, value: transQty || totalProd || 1 }
      ];
      chart.setOption({
        backgroundColor:'transparent',
        title: { text:'供应链流动', left:'center', textStyle:{color:'#00d2ff', fontSize:13} },
        tooltip: { trigger:'item' },
        series: [{
          type:'sankey', layout:'none', emphasis:{focus:'adjacency'},
          nodeAlign:'left', data, links,
          label:{color:'#ccc',fontSize:10},
          lineStyle:{color:'gradient',curveness:0.5},
          itemStyle:{borderWidth:1,borderColor:'#aaa'},
          levels: [
            { depth:0, itemStyle:{color:'#00d2ff'} },
            { depth:1, itemStyle:{color:'#0099cc'} },
            { depth:2, itemStyle:{color:'#00ff88'} },
            { depth:3, itemStyle:{color:'#ffaa00'} },
            { depth:4, itemStyle:{color:'#ff6688'} }
          ]
        }]
      });
    }

    // ========== 3D供应商地图 ==========
    function initSupplierMap3D() {
      const container = document.getElementById('supplierMap3d');
      if (!container) return;
      while (container.firstChild) container.removeChild(container.firstChild);
      const width = container.clientWidth || 400;
      const height = container.clientHeight || 260;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a1428);
      const camera = new THREE.PerspectiveCamera(40, width/height, 0.1, 100);
      camera.position.set(5, 3, 8);
      camera.lookAt(0, 0, 0);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(width, height);
      renderer.shadowMap.enabled = true;
      container.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0x404060);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
      dirLight.position.set(4, 8, 6);
      dirLight.castShadow = true;
      scene.add(dirLight);
      const fill = new THREE.DirectionalLight(0x4488ff, 0.5);
      fill.position.set(-3, 2, 5);
      scene.add(fill);

      const gridHelper = new THREE.GridHelper(8, 12, 0x00d2ff, 0x336699);
      gridHelper.position.y = -1.2;
      scene.add(gridHelper);

      const supplierPositions = [
        { name: '石家庄', pos: [-1.2, 0.8, 1.5] },
        { name: '宝鸡', pos: [-1.8, -0.2, -0.5] },
        { name: '四川', pos: [0.5, -0.6, -1.8] },
        { name: '贵阳', pos: [1.2, 0.2, -1.2] },
        { name: '常州', pos: [2.2, 0.6, 0.5] },
        { name: '东莞', pos: [1.5, -0.4, 1.8] }
      ];
      const extraNodes = [
        { name: '广州厂', pos: [0.2, 1.2, 0.8] },
        { name: '苏州厂', pos: [1.0, 0.9, -0.2] },
        { name: '华北', pos: [-1.5, 0.2, 2.5] },
        { name: '华中', pos: [-0.5, -0.3, 2.8] },
        { name: '日本', pos: [2.8, 0.5, -1.0] },
        { name: '西北', pos: [-2.5, 0.0, -1.5] }
      ];
      const allNodes = [...supplierPositions, ...extraNodes];
      allNodes.forEach((n, i) => {
        const size = i < supplierPositions.length ? 0.45 : 0.3;
        const color = i < supplierPositions.length ? 0xffaa44 : 0x44ccff;
        const geo = new THREE.SphereGeometry(size, 20, 20);
        const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.3, roughness: 0.3, metalness: 0.5 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(n.pos[0], n.pos[1], n.pos[2]);
        mesh.castShadow = true;
        scene.add(mesh);
        const ringGeo = new THREE.RingGeometry(size*1.4, size*1.8, 16);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(n.pos[0], n.pos[1]-0.1, n.pos[2]);
        ring.rotation.x = -Math.PI/2;
        scene.add(ring);
      });

      const lines = [
        ['石家庄', '广州厂'], ['宝鸡', '广州厂'], ['四川', '广州厂'], ['贵阳', '广州厂'], ['常州', '苏州厂'], ['东莞', '苏州厂']
      ];
      lines.forEach(([from, to]) => {
        const fromNode = allNodes.find(n => n.name === from);
        const toNode = allNodes.find(n => n.name === to);
        if (!fromNode || !toNode) return;
        const points = [
          new THREE.Vector3(fromNode.pos[0], fromNode.pos[1], fromNode.pos[2]),
          new THREE.Vector3(toNode.pos[0], toNode.pos[1], toNode.pos[2])
        ];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.25 });
        const line = new THREE.Line(geo, mat);
        scene.add(line);
      });

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.6;
      controls.target.set(0, 0.2, 0);
      controls.enableZoom = true;
      controls.enablePan = false;

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      const resize = () => {
        const w = container.clientWidth, h = container.clientHeight;
        if (w > 0 && h > 0) {
          camera.aspect = w/h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        }
      };
      window.addEventListener('resize', resize);
      const observer = new ResizeObserver(resize);
      observer.observe(container);
    }

    // ========== 模拟与重置 ==========
    function runSimulation() {
      const totalDemand = Object.values(state.demandForecast).reduce((a,b)=>a+b,0);
      const totalProd = Object.values(state.productionPlan).reduce((a,b)=>a+b,0);
      const fillRate = Math.min(100, (totalProd/totalDemand)*100).toFixed(1);
      const prodRate = Math.min(100, (totalProd/MASTER_DATA.factories.production.reduce((a,f)=>a+f.total,0))*100).toFixed(1);
      let totalDev = 0;
      MASTER_DATA.salesPoints.forEach(p => {
        const forecast = state.demandForecast[p.id];
        const actual = p.history.reduce((a,b)=>a+b,0)/6;
        totalDev += Math.abs((forecast - actual)/actual);
      });
      const deviationRate = ((totalDev/MASTER_DATA.salesPoints.length)*100).toFixed(1);
      state.simulationResult = {
        unitProcCost: (3.2 + Math.random()*1.6).toFixed(2),
        unitLogCost: (1.0 + Math.random()*1.2).toFixed(2),
        fillRate, prodRate, deviation: deviationRate,
        procScore: Math.floor(18+Math.random()*7),
        logScore: Math.floor(18+Math.random()*7),
        fillScore: Math.floor(14+Math.random()*6),
        prodScore: Math.floor(10+Math.random()*5),
        devScore: Math.floor(10+Math.random()*5),
        totalScore: 0
      };
      state.simulationResult.totalScore = state.simulationResult.procScore + state.simulationResult.logScore +
        state.simulationResult.fillScore + state.simulationResult.prodScore + state.simulationResult.devScore;
      state.simulationRun = true;
      completeStep(8);
      const username = document.getElementById('username')?.value || 'EMAdmin';
      addScoreRecord(username, state.simulationResult.totalScore);

      const el = document.getElementById('simResultText');
      if (el) { el.classList.remove('hidden'); el.innerHTML = `<div class="card"><h4>模拟完成</h4><p>市场满足率：${fillRate}% | 生产满足率：${prodRate}% | 偏差率：${deviationRate}%</p></div>`; }
      document.getElementById('viewResults')?.classList.remove('hidden');
      notify('60天模拟运行完成！成绩已记录。');
    }

    function resetExperiment() {
      state.currentStep = 1; state.completedSteps = new Set([1]);
      state.demandForecast = { "华北总代":24000, "华中总代":28000, "日本总代":16500, "西北总代":15500 };
      state.productionPlan = { "广州蓄电池厂":86520, "苏州蓄电池厂":105060 };
      state.materialRequirements = { "电极板":0, "电解液":0, "电池壳":0 };
      state.selectedSuppliers = {}; state.selectedRoutes = {}; state.routeQuantities = {};
      state.simulationRun = false; state.simulationResult = null;
      updateStepUI(); navigateToStep(2);
      notify('实验已重置');
    }
    window._nav = navigateToStep;
    updateStepUI();

    // ========== 全局3D背景 ==========
    (function initGlobal3D() {
      const container = document.getElementById('three-container');
      if (!container) return;
      const width = container.clientWidth, height = container.clientHeight;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x080c18);
      const camera = new THREE.PerspectiveCamera(40, width/height, 0.1, 100);
      camera.position.set(5, 3, 12);
      camera.lookAt(0, 0, 0);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(width, height);
      renderer.shadowMap.enabled = true;
      container.appendChild(renderer.domElement);
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.4;
      controls.enableZoom = false;
      controls.enablePan = false;
      controls.target.set(0, 0, 0);
      const ambient = new THREE.AmbientLight(0x404060);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(3, 8, 5);
      scene.add(dirLight);
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 48, 48),
        new THREE.MeshStandardMaterial({ color: 0x00d2ff, emissive: 0x006688, roughness: 0.2, metalness: 0.6, emissiveIntensity: 0.5 })
      );
      core.castShadow = true;
      scene.add(core);
      for (let i = 0; i < 40; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 1.8 + Math.random() * 1.2;
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.04 + Math.random()*0.06, 6, 6),
          new THREE.MeshBasicMaterial({ color: 0x88ccff })
        );
        dot.position.set(x, y, z);
        scene.add(dot);
      }
      const particles = new THREE.BufferGeometry();
      const pos = new Float32Array(400 * 3);
      for (let i=0; i<400*3; i++) pos[i] = (Math.random()-0.5)*25;
      particles.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const pMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.04, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
      const pSys = new THREE.Points(particles, pMat);
      scene.add(pSys);
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        core.rotation.y += 0.002;
        renderer.render(scene, camera);
      }
      animate();
      window.addEventListener('resize', ()=>{
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w/h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
    })();

  })();
</script>
